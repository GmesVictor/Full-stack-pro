<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    
    <h1>Formulário</h1>
    <hr>

    <form action="">
        <label for="">
            primeiro nome:
        </label>
        <input type="text" id="pnome" name="pnome" placeholder="Seu primeiro nome" required>

         <br> <br>

        <label for="">
        Sobrenome:
        </label>
        <input type="text" id="snome" name="snome" placeholder="Sobrenome" required>
        
        <br> <br>

        <!-- Tipo RADIO -->

        <label for="">
            <strong>Qual seu nível como programador atualmente?</strong>
        </label>
        <label for="">
            <input type="radio" name="nível" value="iniciante" >Sou iniciante
        </label>
        <label for="">
            <input type="radio" name="nível" value="intermediário" >intermediário
        </label>
        <label for="">
            <input type="radio" name="nível" value="avançado" >Sou avançado
        </label>

        <br> <br>

        <!-- Tipo Select para selecionar itens-->
         <label for="escolaridade">
            <strong>Qual a sua escolaridade?</strong>
         </label>

         <select id="escolaridade" required>
            <option selected disabled value="">Selecionar</option>
            <option value="">
                Ensino Fundamental
            </option>
            <option value="">
                Ensino Médio
            </option>
            <option value="">
                Ensino Superior
            </option>
         </select>

        <br> <br>

        <input type="submit" value="Cadastrar">

    </form>

</body>
</html>
