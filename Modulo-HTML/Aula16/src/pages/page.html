<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Semântico</title>
  </head>
  <body>
    <h1>HTML Semântico</h1>
    <h2>
      Clique aqui para acessar o
      <a href="/Aula16/index.html">HTML não semântico</a>
    </h2>

        <!-- HEADER = Cabeçalho do site. Usado para agrupar elementos de cabeçalho como uma navegação -->
    <header>
      <h1>Cabeçalho do meu site</h1>
      <ul>
        <li>Home</li>
        <li>Contato</li>
        <li>Sobre</li>
      </ul>
    </header>

    <div>
      <!-- O artigo e como se fosse mais importante que o aside-->
      <article>
        <p>Todos os posts e detalhes do meu site ficará aqui</p>
      </article>

      <aside>
        <p>Seja bem vindo ao meu site!</p>
      </aside>
    </div>

    <footer>
      <p>Todos os direitos reservados ao criador do site - 2026</p>
    </footer>
  </body>
</html>
