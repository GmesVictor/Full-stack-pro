<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Âncora e links</title>
</head>
<body>
    <!--
    Trabalhando com links, externos e internos, e também com a tag de âncora.
-->

    <h1>Trabalhando com links e âncoras</h1>
    <p>Você pode acessar nosso canal no youtube <a href="https://www.youtube.com/@sujeitoprogramador" target="_blank" rel="External">Canal do yutube</a> </p>
    <p>Conheça também nosso blog <a href="https://sujeitoprogramador.com" target="_blank" rel="External">Blog do sujeito programador</a></p>

     <!--
    Vamos falar das tags e subtags a target="-_blank" é para abrir o link em uma nova aba, e o rel="External" é para indicar que o link é externo.
-->

    <hr>
    <a href="Pages/page.html">Contato</a>
    <br>
    <a href="Pages/sobre.html">Sobre</a>
    

</body>
</html>
