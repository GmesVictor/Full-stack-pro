<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <!--
    Tabelas é composta de linhas que são compostas de células.
    As tags são <tr></.tr> para as linhas e 
    <th></th> define o cabeçalho da tabela e 
    <td></td> define as células de dados.
    -->
    <h1>Criando tabelas</h1>

    <table>
        <caption>
            <strong>Tabela de serviços</strong>
        </caption>
        <tr>
            <th>Ordem</th>
            <th>serviço</th>
            <th>Preço</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Troca de vidro</td>
            <td>R$600</td>
            <td>Em andamento</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Limpeza</td>
            <td>R$150</td>
            <td>Aguardando</td>
        </tr>
    </table>

</body>
</html>
