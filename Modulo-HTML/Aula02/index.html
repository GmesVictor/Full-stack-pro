<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens</title>
</head>
<body>
    <h1>Imagens no HTML</h1>
    <p>Para inserir imagens no HTML é usada a tag <strong>img</strong> </p>

    <hr>

    <h1>Minhas imagens</h1>
    <p>Imagem de um código</p>

    <img src="src/img/programador.png" alt="Imagem de um código" width="300" height="300">

    <p>Imagem de uma avenida</p>

    <img src="src/img/avenida.png" alt="Imagem de uma avenida" width="300" height="300">

    <p>Fotografia de Steve Jobs</p>

    <img src="https://benjweinberg.com/wp-content/uploads/2017/03/stevejobsbook.jpg" alt="Steve Jobs" width="300">

    
</body>
</html>
