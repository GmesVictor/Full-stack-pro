<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/css/style.css" />
    <title>Faca seu cadastro - Sujeitogram</title>
  </head>
  <body>
    <!-- Área wrapper -->
    <div id="wrapper">
      <!-- Inicio Área container -->
      <div id="container-signup">
       <!-- AREA DIREITA -->
      <div class="column">
        <div class="login-panel">
          <div class="logo">
            <img class="logo-img" src="/src/assets/logo.png" alt="Logo do Sujeitogram">
          </div>

          <div class="message">
            <span>Cadastre-se para ver fotos e vídeos dos seus amigos.</span>
          </div>

          <button class="cta-button">
            Entrar com Facebook
          </button>

          <div class="divisor-container">
            <div class="line"></div>
            <div class="divisor-tag">ou</div>
            <div class="line"></div>
          </div>

          <form>
            <input placeholder="Número de celular ou email" type="text" name="email"/>
            <input placeholder="Nome completo" type="text" name="name"/>
            <input placeholder="Username" type="text" name="username"/>
            <input placeholder="Senha" type="password" name="password" />

            <input type="submit" value="Entrar" />
          </form>
        
            <!-- Fim login, senha e submit -->
          </div>
          <!-- Fim da direita -->

          <!-- inicio da infobox -->
          <div class="infobox">
            <p>Tem uma conta? <a href="index.html">Conecte-se</a></p>
          </div>
          <!-- Fim da infobox -->

          <!-- Inicio get-app -->

          <div class="get-app-panel">
            <p>obtenha o aplicatico.</p>
            <div class="app-buttons">
              <a href="#">
                <img src="src/assets/appstore.png" alt="Baixe na AppStore" />
              </a>
              <a href="#">
                <img
                  src="src/assets/googleplay.png"
                  alt="Baixe no GooglePlay"
                />
              </a>
            </div>
            <!-- Fim get-app -->
          </div>
        </div>
      </div>
      <!-- Fim Área container -->

      <!-- Rodapé -->
      <footer>
        <div class="footer-inner">
          <a href="#">About us</a>
          <a href="#">Suport</a>
          <a href="#">Blog</a>
          <a href="#">Press</a>
          <a href="#">API</a>
          <a href="#">Jobs</a>
          <a href="#">Terms</a>
          <a href="#">Directory</a>
          <a href="#">Profiles</a>
          <a href="#">Hashtags</a>
          <a href="#">Language</a>
          <div class="text-small">@ 2022 Instagram</div>
        </div>
      </footer>
    </div>
  </body>
</html>
