<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/style.css">
    <title>Sujeitogram</title>
</head>
<body>
    <!-- Área wrapper -->
    <div id="wrapper">
        <!-- Inicio Área container -->
        <div id="container">

            <!-- Inicio Área esquerda -->
            <div class="column left">

            </div>
            <!-- Fim da esquerda -->

            <!-- Inicio Área direita -->
            <div class="column rigt">
                <div class="login-panel">

                    <div class="logo">
                        <img class="logo-img" src="src/assets/logo.png" alt="Logo sujeitogram">
                    </div>

                    <!-- Inicio login, senha e submit -->
                    <form action="">
                        <input placeholder="Telefone, usuario ou email" type="text" name="username">

                        <input placeholder="senha" type="password" name="password">

                        <input type="submit" value="Entrar">
                    </form>
                    <!-- Fim login, senha e submit -->
                </div>
                <!-- Fim da direita -->

                <!-- inicio da infobox -->
                <div class="infobox">
                    <p>Não passui uma conta? <a href="signup.html">Cadastre-se</a>
                    </p>
                </div>
                <!-- Fim da infobox -->

                <!-- Inicio get-app -->

                <div class="get-app-panel">
                    <p>obtenha o aplicatico.</p>
                    <div class="app-buttons">
                        <a href="#">
                            <img src="src/assets/appstore.png" alt="Baixe na AppStore">
                        </a>
                        <a href="#">
                            <img src="src/assets/googleplay.png" alt="Baixe no GooglePlay">
                        </a>
                </div>
                <!-- Fim get-app -->
                </div>

            </div>
        </div>
        <!-- Fim Área container -->

         <!-- Rodapé -->
          <footer>
            <div class="footer-inner">
                <a href="#">About us</a>
                <a href="#">Suport</a>
                <a href="#">Blog</a>
                <a href="#">Press</a>
                <a href="#">API</a>

            </div>

</html>
